databases:
  - name: logitrack-db
    plan: free
    databaseName: logitrack
    user: logitrack

services:
  - type: web
    name: logitrack-pro
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: logitrack-db
          property: connectionString
