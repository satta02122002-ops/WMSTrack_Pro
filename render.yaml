services:
  - type: web
    name: logitrack-pro
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/data
    disk:
      name: logitrack-data
      mountPath: /opt/render/project/data
      sizeGB: 1
